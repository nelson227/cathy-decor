<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9935f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  
  <!-- Floor -->
  <rect y="320" width="600" height="80" fill="#c4a57b" opacity="0.3"/>
  <line x1="0" y1="320" x2="600" y2="320" stroke="#b8906b" stroke-width="2"/>
  
  <!-- Left curtain -->
  <path d="M 40 40 Q 60 80 50 200 Q 45 280 40 320" fill="#c4927d" opacity="0.7"/>
  <!-- Right curtain -->
  <path d="M 560 40 Q 540 80 550 200 Q 555 280 560 320" fill="#c4927d" opacity="0.7"/>
  
  <!-- Arch structure -->
  <defs>
    <path id="archPath" d="M 150 280 Q 300 80 450 280" fill="none" stroke="#8b7355" stroke-width="12"/>
  </defs>
  <use href="#archPath" stroke="#a0826d" stroke-width="12"/>
  
  <!-- Flowers on arch -->
  <!-- Left section flowers -->
  <circle cx="160" cy="240" r="18" fill="#d4899c"/>
  <circle cx="170" cy="225" r="16" fill="#e8a5b5"/>
  <circle cx="150" cy="225" r="16" fill="#c87a8f"/>
  
  <circle cx="180" cy="200" r="15" fill="#e8b8c8"/>
  <circle cx="165" cy="190" r="14" fill="#d4899c"/>
  
  <circle cx="190" cy="160" r="16" fill="#d4899c"/>
  <circle cx="175" cy="150" r="15" fill="#e8a5b5"/>
  <circle cx="205" cy="155" r="14" fill="#c87a8f"/>
  
  <!-- Center top flowers -->
  <circle cx="295" cy="95" r="18" fill="#f5b8d1"/>
  <circle cx="310" cy="105" r="16" fill="#e8a5b5"/>
  <circle cx="280" cy="105" r="16" fill="#d4899c"/>
  <circle cx="305" cy="85" r="15" fill="#f0d9e8"/>
  
  <!-- Right section flowers -->
  <circle cx="440" cy="240" r="18" fill="#d4899c"/>
  <circle cx="430" cy="225" r="16" fill="#e8a5b5"/>
  <circle cx="450" cy="225" r="16" fill="#c87a8f"/>
  
  <circle cx="420" cy="200" r="15" fill="#e8b8c8"/>
  <circle cx="435" cy="190" r="14" fill="#d4899c"/>
  
  <circle cx="410" cy="160" r="16" fill="#d4899c"/>
  <circle cx="425" cy="150" r="15" fill="#e8a5b5"/>
  <circle cx="395" cy="155" r="14" fill="#c87a8f"/>
  
  <!-- Green leaves -->
  <ellipse cx="175" cy="210" rx="8" ry="14" fill="#6b8e3d" transform="rotate(-30 175 210)"/>
  <ellipse cx="195" cy="175" rx="8" ry="14" fill="#7a9e4d" transform="rotate(20 195 175)"/>
  <ellipse cx="425" cy="210" rx="8" ry="14" fill="#6b8e3d" transform="rotate(30 425 210)"/>
  <ellipse cx="405" cy="175" rx="8" ry="14" fill="#7a9e4d" transform="rotate(-20 405 175)"/>
  <ellipse cx="290" cy="110" rx="10" ry="16" fill="#6b8e3d" transform="rotate(-45 290 110)"/>
  <ellipse cx="310" cy="110" rx="10" ry="16" fill="#7a9e4d" transform="rotate(45 310 110)"/>
  
  <!-- Couple silhouettes -->
  <!-- Groom -->
  <ellipse cx="230" cy="280" rx="12" ry="20" fill="#1a1a1a"/> <!-- head -->
  <path d="M 225 300 L 220 330 L 225 330 L 230 320 L 235 330 L 240 330 L 235 300" fill="#2a2a3a"/> <!-- body -->
  
  <!-- Bride -->
  <ellipse cx="370" cy="280" rx="12" ry="20" fill="#1a1a1a"/> <!-- head -->
  <path d="M 365 300 L 355 330 Q 360 340 370 340 Q 380 340 385 330 L 375 300" fill="#f0e6e1"/> <!-- dress -->
  <circle cx="368" cy="305" r="6" fill="#e8d4c8"/> <!-- veil highlight -->
  
  <!-- Decorative table setup -->
  <rect x="120" y="330" width="360" height="50" fill="#d4a574" opacity="0.4" rx="3"/>
  <line x1="140" y1="340" x2="460" y2="340" stroke="#c9935f" stroke-width="2"/>
  
  <!-- Small table flower arrangements on sides -->
  <circle cx="140" cy="355" r="8" fill="#d4899c"/>
  <circle cx="460" cy="355" r="8" fill="#d4899c"/>
</svg>