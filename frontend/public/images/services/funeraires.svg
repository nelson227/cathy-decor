<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" width="600" height="400">
  <defs>
    <linearGradient id="funBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e4dc"/>
      <stop offset="100%" style="stop-color:#d8d0c4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#funBg)"/>
  <!-- Floor line -->
  <line x1="0" y1="280" x2="600" y2="280" stroke="#c4b8a8" stroke-width="2"/>
  <!-- Arch -->
  <path d="M 150 280 Q 300 120 450 280" fill="none" stroke="#8b7355" stroke-width="12"/>
  <!-- White flowers on arch -->
  <circle cx="180" cy="240" r="16" fill="#ede6e1"/>
  <circle cx="420" cy="240" r="16" fill="#ede6e1"/>
  <circle cx="300" cy="140" r="18" fill="#f5f0e8"/>
  <!-- Green foliage -->
  <ellipse cx="200" cy="220" rx="10" ry="14" fill="#5a7a3a" transform="rotate(-30 200 220)"/>
  <ellipse cx="400" cy="220" rx="10" ry="14" fill="#5a7a3a" transform="rotate(30 400 220)"/>
  <!-- Candles -->
  <rect x="130" y="260" width="12" height="35" fill="#f5e8d8"/>
  <circle cx="136" cy="258" r="4" fill="#ffa500"/>
  <rect x="458" y="260" width="12" height="35" fill="#f5e8d8"/>
  <circle cx="464" cy="258" r="4" fill="#ffa500"/>
  <!-- Candle glow -->
  <circle cx="136" cy="258" r="6" fill="#ffa500" opacity="0.2"/>
  <circle cx="464" cy="258" r="6" fill="#ffa500" opacity="0.2"/>
  <text x="300" y="340" font-size="44" font-weight="bold" text-anchor="middle" fill="#5a5a5a">Funéraires</text>
</svg>