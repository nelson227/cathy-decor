<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - somber and respectful -->
  <defs>
    <linearGradient id="bgGradFuneraire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e4dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8d0c4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGradFuneraire)"/>
  
  <!-- Subtle floor pattern -->
  <line x1="0" y1="320" x2="600" y2="320" stroke="#c4b8a8" stroke-width="2"/>
  <rect y="320" width="600" height="80" fill="#b8a898" opacity="0.1"/>
  
  <!-- Pedestal/altar -->
  <rect x="220" y="260" width="160" height="80" fill="#8b7355" opacity="0.6"/>
  <rect x="215" y="250" width="170" height="15" fill="#997755" opacity="0.8"/>
  <rect x="225" y="340" width="150" height="10" fill="#6b5345" opacity="0.5"/>
  
  <!-- Drapery/cloth on altar -->
  <path d="M 220 265 Q 240 260 260 270 Q 280 260 300 265 Q 320 260 340 270 Q 360 260 380 265 L 380 330 Q 300 335 220 330 Z" fill="#3a3a3a" opacity="0.7"/>
  
  <!-- Elegant floral wreath - white and cream flowers -->
  <!-- Main wreath circle position -->
  <!-- Roses arrangement - top -->
  <circle cx="300" cy="140" r="20" fill="#ede6e1"/>
  <circle cx="282" cy="155" r="18" fill="#f5f0e8"/>
  <circle cx="318" cy="155" r="18" fill="#f5f0e8"/>
  <circle cx="290" cy="130" r="16" fill="#f0ebe3"/>
  <circle cx="310" cy="130" r="16" fill="#f0ebe3"/>
  
  <!-- Side roses - left -->
  <circle cx="160" cy="200" r="19" fill="#ede6e1"/>
  <circle cx="145" cy="215" r="17" fill="#f5f0e8"/>
  <circle cx="175" cy="220" r="17" fill="#f5f0e8"/>
  <circle cx="150" cy="195" r="15" fill="#f0ebe3"/>
  
  <!-- Side roses - right -->
  <circle cx="440" cy="200" r="19" fill="#ede6e1"/>
  <circle cx="455" cy="215" r="17" fill="#f5f0e8"/>
  <circle cx="425" cy="220" r="17" fill="#f5f0e8"/>
  <circle cx="450" cy="195" r="15" fill="#f0ebe3"/>
  
  <!-- Bottom roses arrangement -->
  <circle cx="300" cy="270" r="20" fill="#ede6e1"/>
  <circle cx="318" cy="260" r="18" fill="#f5f0e8"/>
  <circle cx="282" cy="260" r="18" fill="#f5f0e8"/>
  <circle cx="310" cy="280" r="16" fill="#f0ebe3"/>
  <circle cx="290" cy="280" r="16" fill="#f0ebe3"/>
  
  <!-- Green foliage -->
  <ellipse cx="220" cy="170" rx="12" ry="18" fill="#5a7a3a" transform="rotate(-40 220 170)"/>
  <ellipse cx="380" cy="170" rx="12" ry="18" fill="#5a7a3a" transform="rotate(40 380 170)"/>
  <ellipse cx="160" cy="240" rx="12" ry="18" fill="#6a8a4a" transform="rotate(30 160 240)"/>
  <ellipse cx="440" cy="240" rx="12" ry="18" fill="#6a8a4a" transform="rotate(-30 440 240)"/>
  <ellipse cx="260" cy="310" rx="12" ry="18" fill="#5a7a3a" transform="rotate(-25 260 310)"/>
  <ellipse cx="340" cy="310" rx="12" ry="18" fill="#5a7a3a" transform="rotate(25 340 310)"/>
  
  <!-- Small filler flowers (cream) -->
  <circle cx="240" cy="185" r="11" fill="#ede6e1"/>
  <circle cx="360" cy="185" r="11" fill="#ede6e1"/>
  <circle cx="195" cy="225" r="10" fill="#f0ebe3"/>
  <circle cx="405" cy="225" r="10" fill="#f0ebe3"/>
  <circle cx="250" cy="250" r="10" fill="#f5f0e8"/>
  <circle cx="350" cy="250" r="10" fill="#f5f0e8"/>
  
  <!-- Wreath outline -->
  <ellipse cx="300" cy="210" rx="105" ry="95" fill="none" stroke="#5a7a3a" stroke-width="3" opacity="0.2"/>
  
  <!-- Ribbon at bottom of wreath -->
  <path d="M 240 305 L 360 305 Q 380 320 300 330 Q 220 320 240 305" fill="#4a4a4a" opacity="0.6"/>
  <text x="300" y="325" font-size="12" font-family="serif" text-anchor="middle" fill="#e8e4dc" opacity="0.8">IN MEMORIAM</text>
  
  <!-- Candles on sides (optional reverence element) -->
  <!-- Left candle -->
  <rect x="100" y="270" width="14" height="45" fill="#f5e8d8" stroke="#c4a888" stroke-width="1"/>
  <ellipse cx="107" cy="270" rx="7" ry="3" fill="#e8d8c8"/>
  <circle cx="107" cy="268" r="4" fill="#ffa500" opacity="0.7"/>
  
  <!-- Right candle -->
  <rect x="486" y="270" width="14" height="45" fill="#f5e8d8" stroke="#c4a888" stroke-width="1"/>
  <ellipse cx="493" cy="270" rx="7" ry="3" fill="#e8d8c8"/>
  <circle cx="493" cy="268" r="4" fill="#ffa500" opacity="0.7"/>
  
  <!-- Candle glow -->
  <circle cx="107" cy="268" r="6" fill="#ffa500" opacity="0.2"/>
  <circle cx="493" cy="268" r="6" fill="#ffa500" opacity="0.2"/>
  
  <!-- Subtle light on flowers -->
  <circle cx="300" cy="130" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="168" cy="193" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="432" cy="193" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="300" cy="265" r="3" fill="#ffffff" opacity="0.3"/>
</svg>