<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" width="600" height="400">
  <defs>
    <linearGradient id="baptBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f5f0"/>
      <stop offset="100%" style="stop-color:#e0f0e0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#baptBg)"/>
  <!-- Wreath circle -->
  <circle cx="300" cy="180" r="100" fill="none" stroke="#8bb674" stroke-width="8" opacity="0.3"/>
  <!-- Flowers -->
  <circle cx="300" cy="90" r="18" fill="#f5f0e8"/>
  <circle cx="240" cy="150" r="18" fill="#f5f0e8"/>
  <circle cx="360" cy="150" r="18" fill="#f5f0e8"/>
  <circle cx="270" cy="250" r="18" fill="#f5f0e8"/>
  <circle cx="330" cy="250" r="18" fill="#f5f0e8"/>
  <!-- Blue accents -->
  <circle cx="280" cy="140" r="14" fill="#b8d4e8"/>
  <circle cx="320" cy="140" r="14" fill="#b8d4e8"/>
  <circle cx="300" cy="210" r="14" fill="#b8d4e8"/>
  <!-- Leaves -->
  <ellipse cx="260" cy="120" rx="8" ry="12" fill="#7a9e4d" transform="rotate(-35 260 120)"/>
  <ellipse cx="340" cy="120" rx="8" ry="12" fill="#7a9e4d" transform="rotate(35 340 120)"/>
  <!-- Ribbon bow -->
  <path d="M 240 90 Q 270 75 300 85 Q 330 75 360 90" fill="#c4e8f0"/>
  <circle cx="298" cy="87" r="5" fill="#a8d4e8"/>
  <text x="300" y="330" font-size="44" font-weight="bold" text-anchor="middle" fill="#6b8e3d">Baptême</text>
</svg>